<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harry | صمم موقعك الآن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/><style>
:root{
--primary:#00ff88;--bg:#0a0a0a;--text:#e0e0e0;--card:rgba(255,255,255,0.05);--border:rgba(0,255,136,0.25);--glow:0 0 20px rgba(0,255,136,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);transition:0.4s;scroll-behavior:smooth}
.container{width:min(1200px,90%);margin:auto}
nav{position:fixed;top:0;left:0;right:0;background:var(--card);backdrop-filter:blur(10px);display:flex;justify-content:space-between;padding:1rem;z-index:1000}
.logo{color:var(--primary);font-weight:bold}
header{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative}
h1{color:var(--primary);font-size:3rem;text-shadow:var(--glow)}
.cta{margin-top:20px;padding:15px 25px;background:var(--primary);border:none;border-radius:40px;cursor:pointer;transition:0.3s}
.cta:hover{transform:scale(1.05);box-shadow:var(--glow)}
section{padding:5rem 0}
h2{text-align:center;color:var(--primary);margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem}
.card{background:var(--card);padding:1.5rem;border-radius:15px;border:1px solid var(--border);text-align:center;transition:0.3s}
.card:hover{transform:translateY(-10px);box-shadow:var(--glow)}
.price{font-size:2rem;color:var(--primary)}
.whatsapp{display:inline-block;margin-top:1rem;background:#25D366;color:#fff;padding:10px 15px;border-radius:30px;text-decoration:none;transition:0.3s}
.whatsapp:hover{transform:scale(1.05);box-shadow:var(--glow)}
.review{font-size:0.9rem;opacity:0.9}
.stat{font-size:2.2rem;color:var(--primary);text-shadow:var(--glow)}
.whatsapp-float{position:fixed;bottom:20px;left:20px;background:#25D366;color:#fff;padding:15px;border-radius:50%;cursor:pointer;z-index:1000;transition:0.3s}
.whatsapp-float:hover{transform:scale(1.1);box-shadow:var(--glow)}
.popup{position:fixed;bottom:90px;left:20px;background:#111;padding:15px;border-radius:10px;border:1px solid var(--border);display:none;z-index:1000;animation:fadeIn 0.5s}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.notification{position:fixed;bottom:120px;left:20px;background:var(--card);padding:15px;border-radius:10px;border:1px solid var(--border);display:none;z-index:1000;animation:fadeIn 0.5s;text-align:center;}
.notification button{margin-top:10px;padding:8px 15px;border:none;border-radius:20px;cursor:pointer;background:var(--primary);color:#000;font-weight:bold;transition:0.3s}
.notification button:hover{transform:scale(1.05);box-shadow:var(--glow)}
.countdown{color:#ff4d4d;font-weight:bold;font-size:1.2rem;margin-top:10px}
</style></head>
<body><nav>
<div class="logo">Harry</div>
</nav><header>
<div>
<h1>اصنع موقعك الآن ولاااك 🚀</h1>
<p>مواقع احترافية تجلب لك عملاء حقيقيين ولااااك</p>
<button class="cta" onclick="go()">ابدأ الآن ولااااك</button>
<div class="countdown" id="discount">ولااااك عرض خاص ينتهي خلال 24:00:00</div>
</div>
</header><section>
<div class="container">
<h2>الخدمات</h2>
<div class="grid">
<div class="card">
<h3>موقع بسيط</h3>
<div class="price">$50</div>
<a class="whatsapp" onclick="track('موقع بسيط')" href="https://wa.me/963938401646?text=أريد موقع بسيط">اطلب</a>
</div>
<div class="card">
<h3>موقع احترافي</h3>
<div class="price">$120</div>
<a class="whatsapp" onclick="track('موقع احترافي')" href="https://wa.me/963938401646?text=أريد موقع احترافي">اطلب</a>
</div>
</div>
</div>
</section><section>
<div class="container">
<h2>آراء العملاء ⭐</h2>
<div class="grid" id="reviews"></div>
</div>
</section><section>
<div class="container">
<h2>إحصائياتي</h2>
<div class="grid">
<div class="card"><div class="stat" id="clients">0</div>عملاء</div>
<div class="card"><div class="stat" id="projects">0</div>مشاريع</div>
</div>
</div>
</section><a class="whatsapp-float" onclick="openWhatsApp()">💬</a>

<div class="popup" id="popup">🔔 عميل طلب موقع قبل قليل</div>
<div class="notification" id="notif"></div><script>
// counters
let clients = parseInt(localStorage.getItem('c')) || 15;
let projects = parseInt(localStorage.getItem('p')) || 25;
document.getElementById('clients').innerText = clients;
document.getElementById('projects').innerText = projects;

function track(type){
  clients++;
  localStorage.setItem('c',clients);
  document.getElementById('clients').innerText = clients;
  showPopup('عميل طلب '+type+'!');
}

function openWhatsApp(){
  window.open('https://wa.me/963938401646?text=مرحباً، أريد تصميم موقع', '_blank');
}

function showPopup(msg){
  const p = document.getElementById('popup');
  p.innerText='🔔 '+msg;
  p.style.display='block';
  setTimeout(()=>p.style.display='none',3000);
}

// live fake notifications every 12s
setInterval(()=>{
  const services=['موقع بسيط','موقع احترافي','متجر إلكتروني'];
  const service=services[Math.floor(Math.random()*services.length)];
  showPopup('عميل طلب '+service+' قبل قليل');
},12000);

// social proof auto increment
setInterval(()=>{
  if(Math.random()>0.6){clients++;localStorage.setItem('c',clients);document.getElementById('clients').innerText=clients;}
  if(Math.random()>0.7){projects++;localStorage.setItem('p',projects);document.getElementById('projects').innerText=projects;}
},8000);

// notification popup persuasion system
setTimeout(showNotif,3000);
setInterval(showNotif,18000);
function showNotif(){
  const notif = document.getElementById('notif');
  const messages=['عميل طلب موقع قبل قليل!','عملاء جدد في انتظارك!','طلب موقع جديد تم!'];
  const msg = messages[Math.floor(Math.random()*messages.length)];
  notif.innerHTML='🔔 '+msg+'<br><button onclick="openWhatsApp()">تواصل الآن</button><button onclick="notif.style.display=\'none\'" style="background:#444;color:#fff">إغلاق</button>';
  notif.style.display='block';
  setTimeout(()=>notif.style.display='none',5000);
}

// Fake reviews system
const fakeReviews=[
  '"موقع رائع وزاد العملاء عندي"',
  '"سرعة وتنفيذ ممتاز"',
  '"أفضل مطور تعاملت معه"',
  '"أنصح به بشدة لأي شخص يريد موقع"',
  '"تجربة احترافية ومميزة"'
];
const reviewsContainer=document.getElementById('reviews');
let reviewIndex=0;
setInterval(()=>{
  reviewsContainer.innerHTML='';
  for(let i=0;i<3;i++){
    const div=document.createElement('div');
    div.className='card review';
    div.innerText=fakeReviews[(reviewIndex+i)%fakeReviews.length];
    reviewsContainer.appendChild(div);
  }
  reviewIndex=(reviewIndex+1)%fakeReviews.length;
},5000);

// discount countdown
let discountTime=24*60*60; // 24 hours in seconds
const discountEl=document.getElementById('discount');
setInterval(()=>{
  discountTime--;
  let h=Math.floor(discountTime/3600).toString().padStart(2,'0');
  let m=Math.floor((discountTime%3600)/60).toString().padStart(2,'0');
  let s=(discountTime%60).toString().padStart(2,'0');
  discountEl.innerText=`عرض خاص ينتهي خلال ${h}:${m}:${s}`;
  if(discountTime<=0){discountEl.innerText='العرض انتهى!';}
},1000);

// CTA scroll simulation
function go(){window.location.href='#'}
</script></body>
</html>
