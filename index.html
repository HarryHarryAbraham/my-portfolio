<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry - مطور ويب فريلانسر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --text: #fff; }
        body.light { --bg: #f0f0f0; --text: #000; --primary: #008000; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            transition: 0.5s;
        }
        /* باقي الـ CSS نفسه (اختصرت عشان الرسالة ما تطول) */
        nav, header, section, footer { padding: 20px; text-align: center; }
        .btn { background: var(--primary); color: #000; padding: 15px 35px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Harry</div>
        <button id="themeBtn" class="btn" style="padding:10px 20px;">🌙 تبديل الثيم</button>
    </nav>

    <header>
        <h1>👋 أنا Harry</h1>
        <p>مطور ويب فريلانسر • JavaScript شغال الآن ✨</p>
        <p id="visitCount">عدد الزيارات: 0</p>
    </header>

    <!-- باقي الأقسام (عني، مهاراتي، اتصل بي) نفسها -->

    <script>
        // ١. زر تغيير الثيم
        const themeBtn = document.getElementById('themeBtn');
        let isLight = false;
        themeBtn.addEventListener('click', () => {
            isLight = !isLight;
            document.body.classList.toggle('light', isLight);
            themeBtn.textContent = isLight ? '☀️ تبديل الثيم' : '🌙 تبديل الثيم';
        });

        // ٢. عداد الزيارات
        let visits = localStorage.getItem('visits') || 0;
        visits++;
        localStorage.setItem('visits', visits);
        document.getElementById('visitCount').textContent = `عدد الزيارات: ${visits}`;

        // ٣. الزر السحري القديم (ما زال موجود)
        console.log('✅ JavaScript متقدم شغال يا Harry!');
    </script>
</body>
</html>

<p style="color: yellow; font-size: 24px; text-align: center;">
    هذا التعديل جاء من Termux مباشرة! 🦅
</p>
